<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="headingContainer">
        <h2 id="heading">Rock Paper Scissors</h2>
    </div>
    <div class="main">
        <button id="paper" class="choices"><img src="paper.png" class="elements"></button>
        <button id="rock" class="choices"><img src="rock.png" class="elements"></button>
        <button id="scissors" class="choices"><img src="sci2.png" class="elements"></button>
    </div>
    <div class="score">
        <div class="score-cardP">
            <p id="playerScore"> 0 </p>
            <p>You</p>
        </div>
        <div class="score-cardC">
            <p id="compScore">0</p>
            <p>Comp</p>
        </div>
    </div>
    <div class="result">
        <p id="yourMove">Your Move</p>
    </div>
    <script src="first.js"></script>
</body>

</html>
